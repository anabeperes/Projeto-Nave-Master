Como adicionar uma nova intenção no playbook
Quando aparecer um padrão novo de mensagem que se repete (mais de 3-4 vezes na mesma semana), adiciona no playbook. Template:


## NOME_EM_CAIXA_ALTA


Gatilhos: palavra/frase 1, palavra/frase 2, situação X.


Objetivo: o que essa resposta precisa resolver.


Resposta base:


  Texto da resposta aqui, mantendo estilo humano.


Ação adicional (opcional): [O QUE MAIS O CS PRECISA FAZER]


Observação (opcional): detalhe importante.


Regras de ouro:


1. IDs em CAIXA_ALTA_COM_UNDERSCORE — isso ajuda você a rastrear no relatório (o campo intencao sai igual).
2. Gatilhos específicos e em variações reais — pense nas palavras que seus mentorados usam, não no "português oficial".
3. Resposta base curta — o agente adapta pra cada contexto.
4. Depois de adicionar aqui, cole a seção do playbook atualizada no Code node "Montar Request OpenAI" do workflow 04-workflow-relatorio-hora.json.


________________


Por que o prompt está em um Code node (e não direto no HTTP Request)
Originalmente o prompt ficava em JSON escapado dentro do nó HTTP Request. Isso funciona, mas é horrível de editar — quebras de linha, aspas e caracteres especiais viram um pesadelo. Mudamos pra Code node porque:


1. Você edita num editor de código multi-linha, com syntax highlighting.
2. Aspas, emojis, acentos e \n funcionam natural.
3. Dá pra testar o prompt isolado (clicando "Execute node").
4. O HTTP Request fica trivial: só faz o POST com o body que o Code montou.


________________


Parâmetros do modelo
Parâmetro
	Valor
	Por quê
	model
	gpt-4o
	Melhor custo/benefício pra análise de tom + geração em PT-BR.
	temperature
	0.3
	Baixo pra consistência na classificação e na aderência ao playbook.
	response_format
	{ "type": "json_object" }
	Força JSON válido — zero erro de parse.
	

Pra economizar: troca por gpt-4o-mini. Custa ~1/20 e ainda entrega bem nesse caso. Pra respostas mais criativas: sobe temperature pra 0.5-0.6 (cuidado: pode começar a "inventar" fora do playbook).


________________


Custo estimado por mensagem
Com o playbook atual o system prompt tem ~1600 tokens. Cada análise:


* Input: ~1800 tokens (system + user + histórico da pessoa)
* Output: ~300 tokens


Com gpt-4o: ~US$ 0,007 por análise (~R$ 0,04). Com gpt-4o-mini: ~US$ 0,0004 por análise (~R$ 0,002).


50 análises/dia × 20 dias úteis = 1000 análises/mês → R$ 40 com 4o, R$ 2 com 4o-mini.


