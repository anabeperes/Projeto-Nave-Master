Etapa 1 — Contratar o VPS e instalar n8n + Evolution
1.1 Contratar VPS
Recomendo Hostinger VPS KVM 1 (~R$35/mês) ou Contabo VPS S (~R$25/mês). Especificação mínima:


* 2 vCPU, 4GB RAM, 60GB SSD
* Ubuntu 22.04 LTS
1.2 Instalar Docker no VPS
Depois de conectar via SSH:


sudo apt update && sudo apt upgrade -y


curl -fsSL https://get.docker.com | sh


sudo apt install docker-compose-plugin -y
1.3 Subir n8n + Evolution API com Docker Compose
Crie a pasta e o arquivo docker-compose.yml:


mkdir ~/stack && cd ~/stack


nano docker-compose.yml


Cole o conteúdo abaixo (troque SEU_DOMINIO.com, senhas e tokens):


version: '3.8'


services:


  n8n:


    image: n8nio/n8n:latest


    restart: always


    ports:


      - "5678:5678"


    environment:


      - N8N_HOST=n8n.SEU_DOMINIO.com


      - N8N_PROTOCOL=https


      - WEBHOOK_URL=https://n8n.SEU_DOMINIO.com/


      - GENERIC_TIMEZONE=America/Sao_Paulo


      - TZ=America/Sao_Paulo


      - N8N_BASIC_AUTH_ACTIVE=true


      - N8N_BASIC_AUTH_USER=admin


      - N8N_BASIC_AUTH_PASSWORD=TROQUE_ESSA_SENHA


    volumes:


      - ./n8n_data:/home/node/.n8n


  evolution:


    image: atendai/evolution-api:latest


    restart: always


    ports:


      - "8080:8080"


    environment:


      - AUTHENTICATION_API_KEY=TROQUE_POR_UMA_CHAVE_FORTE_AQUI


      - LANGUAGE=pt-BR


      - DATABASE_ENABLED=false


      - CACHE_REDIS_ENABLED=false


      - WEBHOOK_GLOBAL_URL=https://n8n.SEU_DOMINIO.com/webhook/evolution-webhook


      - WEBHOOK_GLOBAL_ENABLED=true


      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false


      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true


    volumes:


      - ./evolution_data:/evolution/instances


Suba:


sudo docker compose up -d
1.4 Configurar domínio e HTTPS
Aponte n8n.SEU_DOMINIO.com e evo.SEU_DOMINIO.com pro IP do VPS (no Registro.br, Cloudflare ou onde você comprou o domínio).


Depois instale o Nginx Proxy Manager ou use Caddy como reverse proxy com SSL automático. O caminho mais rápido é o Caddy:


sudo apt install caddy -y


sudo nano /etc/caddy/Caddyfile


Cole:


n8n.SEU_DOMINIO.com {


    reverse_proxy localhost:5678


}


evo.SEU_DOMINIO.com {


    reverse_proxy localhost:8080


}


Recarregue: sudo systemctl reload caddy


Agora o n8n está em https://n8n.SEU_DOMINIO.com e a Evolution em https://evo.SEU_DOMINIO.com.


