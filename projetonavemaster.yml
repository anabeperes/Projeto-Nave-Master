🗄️ SCHEMA DO BANCO (Supabase / Postgres)
CREATE TABLE IF NOT EXISTS contacts (


  id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),


  whatsapp_number  TEXT UNIQUE NOT NULL,


  name             TEXT,


  first_seen_at    TIMESTAMPTZ NOT NULL DEFAULT now(),


  last_message_at  TIMESTAMPTZ


);


CREATE TABLE IF NOT EXISTS messages (


  id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),


  contact_id       UUID REFERENCES contacts(id) ON DELETE CASCADE,


  whatsapp_number  TEXT NOT NULL,


  contact_name     TEXT,


  direction        TEXT NOT NULL CHECK (direction IN ('incoming','outgoing')),


  content          TEXT NOT NULL,


  evolution_msg_id TEXT UNIQUE,


  status           TEXT NOT NULL DEFAULT 'unread' CHECK (status IN ('unread','read')),


  received_at      TIMESTAMPTZ NOT NULL DEFAULT now(),


  read_at          TIMESTAMPTZ


);


CREATE INDEX IF NOT EXISTS idx_messages_status        ON messages(status);


CREATE INDEX IF NOT EXISTS idx_messages_number        ON messages(whatsapp_number);


CREATE INDEX IF NOT EXISTS idx_messages_received_at   ON messages(received_at);


CREATE INDEX IF NOT EXISTS idx_messages_status_number ON messages(status, whatsapp_number);


CREATE OR REPLACE VIEW v_unread_conversations AS


SELECT


  whatsapp_number,


  MAX(contact_name) AS contact_name,


  COUNT(*) AS qtd_mensagens,


  MIN(received_at) AS primeira_mensagem_em,


  MAX(received_at) AS ultima_mensagem_em,


  string_agg(content, E'\n---\n' ORDER BY received_at ASC) AS mensagens_concatenadas,


  EXTRACT(EPOCH FROM (now() - MIN(received_at)))/3600 AS horas_aguardando


FROM messages


WHERE status = 'unread' AND direction = 'incoming'


GROUP BY whatsapp_number


ORDER BY MIN(received_at) ASC;


CREATE OR REPLACE FUNCTION mark_conversation_as_read(p_whatsapp_number TEXT)


RETURNS INTEGER AS $$


DECLARE v_count INTEGER;


BEGIN


  UPDATE messages SET status = 'read', read_at = now()


  WHERE whatsapp_number = p_whatsapp_number AND status = 'unread' AND direction = 'incoming';


  GET DIAGNOSTICS v_count = ROW_COUNT;


  RETURN v_count;


END;


$$ LANGUAGE plpgsql;


CREATE OR REPLACE FUNCTION upsert_contact(p_whatsapp_number TEXT, p_name TEXT)


RETURNS UUID AS $$


DECLARE v_id UUID;


BEGIN


  INSERT INTO contacts (whatsapp_number, name, last_message_at)


  VALUES (p_whatsapp_number, p_name, now())


  ON CONFLICT (whatsapp_number) DO UPDATE


    SET name = COALESCE(EXCLUDED.name, contacts.name), last_message_at = now()


  RETURNING id INTO v_id;


  RETURN v_id;


END;


$$ LANGUAGE plpgsql;


CREATE OR REPLACE FUNCTION get_daily_stats(p_date DATE DEFAULT CURRENT_DATE)


RETURNS TABLE(


  total_mensagens       BIGINT,


  mentorados_unicos     BIGINT,


  nomes_unicos          TEXT,


  mensagens_respondidas BIGINT,


  mensagens_pendentes   BIGINT,


  tempo_medio_min       NUMERIC,


  tempo_mediano_min     NUMERIC,


  tempo_max_min         NUMERIC,


  tempo_min_min         NUMERIC


) AS $$


BEGIN


  RETURN QUERY


  WITH response_times AS (


    SELECT m.id, m.whatsapp_number, m.contact_name, m.received_at,


      (SELECT MIN(o.received_at) FROM messages o


       WHERE o.whatsapp_number = m.whatsapp_number


         AND o.direction = 'outgoing' AND o.received_at > m.received_at


         AND o.received_at < p_date + INTERVAL '2 days') AS responded_at


    FROM messages m


    WHERE m.direction = 'incoming'


      AND m.received_at >= p_date AND m.received_at < p_date + INTERVAL '1 day'


  )


  SELECT


    COUNT(*)::BIGINT,


    COUNT(DISTINCT rt.whatsapp_number)::BIGINT,


    (SELECT string_agg(DISTINCT COALESCE(rt2.contact_name, rt2.whatsapp_number), ', ') FROM response_times rt2),


    COUNT(rt.responded_at)::BIGINT,


    (COUNT(*) FILTER (WHERE rt.responded_at IS NULL))::BIGINT,


    ROUND(AVG(EXTRACT(EPOCH FROM (rt.responded_at - rt.received_at))/60)::NUMERIC, 1),


    ROUND(PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (rt.responded_at - rt.received_at))/60)::NUMERIC, 1),


    ROUND(MAX(EXTRACT(EPOCH FROM (rt.responded_at - rt.received_at))/60)::NUMERIC, 1),


    ROUND(MIN(EXTRACT(EPOCH FROM (rt.responded_at - rt.received_at))/60)::NUMERIC, 1)


  FROM response_times rt;


END;


$$ LANGUAGE plpgsql;


