📌 CONTEXTO — O QUE ESTOU CONSTRUINDO
Sou Ana, da Mentoria Fluxo. Estou montando um fluxo no n8n pra otimizar o tempo de resposta do meu CS (Customer Success).


Como funciona na prática:


1. Cliente (mentorado) me manda mensagem no WhatsApp (contato SEMPRE passivo — cliente inicia, eu respondo)
2. A mensagem é capturada pela Evolution API e vai pro n8n
3. O n8n salva no Supabase e, de hora em hora, chama o GPT-4o pra classificar urgência + sugerir resposta
4. A sugestão cai no Slack do meu CS em 2 mensagens (detalhada + resumo)
5. Meu CS lê, copia, adapta se precisa, e envia manualmente pelo WhatsApp do próprio celular
6. Quando o CS responde, a Evolution detecta e marca a conversa como "lida" automaticamente


Regra sagrada: NENHUMA mensagem é enviada automaticamente pro cliente. A automação só sugere respostas pro CS humano.


