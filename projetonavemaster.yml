03 — GUIA DE SETUP (8 FASES)
Guia de Setup — Fluxo CS WhatsApp (n8n + Evolution + Supabase + GPT-4o + Slack)
Este guia monta do zero o fluxo completo que você desenhou. Tempo estimado: 2 a 4 horas se é sua primeira vez fazendo setup de VPS. Se você já tem os serviços rodando, é coisa de 30 minutos.
Visão geral do fluxo
Cliente → WhatsApp (seu número atual)


            │


            ▼


   Evolution API (VPS)  ── webhook ──►  n8n


                                         │


                                         ▼


                               Supabase (Postgres)


                                         │


                                         │  ⏰ seg-sex, 9h-17h, a cada hora


                                         ▼


                                   GPT-4o (OpenAI)


                                         │


                                         ▼


                              Slack (2 mensagens no canal)


                              ├─ 📋 Relatório detalhado


                              └─ 📊 Resumo geral


Quando seu CS responde pelo WhatsApp no seu celular, a Evolution detecta e marca a conversa como "lida" automaticamente.


