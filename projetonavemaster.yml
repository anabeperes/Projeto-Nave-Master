🎯 O que estamos construindo
Um fluxo automatizado em n8n que:


1. Recebe as mensagens do WhatsApp dos meus mentorados (via Evolution API)
2. Salva tudo num banco de dados (Supabase/Postgres)
3. A cada hora útil (seg-sex, 9h-17h), um agente GPT-4o:
   * Classifica cada conversa em urgência ALTA/MEDIA/BAIXA
   * Identifica a intenção comparando com um playbook da Mentoria Fluxo
   * Gera uma sugestão de resposta pronta pro meu CS copiar e colar
4. Envia 2 mensagens no Slack do meu CS:
   * Mensagem 1: relatório detalhado (1 bloco por mentorado, com nome + mensagem original + sugestão + intenção identificada)
   * Mensagem 2: resumo geral (quantidade de chats não lidos POR PESSOA, e nomes dos mentorados)
5. Todo dia útil às 18h, manda também um relatório diário com:
   * Quantidade de mensagens recebidas
   * Mentorados únicos que chamaram
   * Tempo de resposta do CS (médio, mediano, mais rápido, mais demorado)


IMPORTANTE — não-negociável:


* Nada é enviado automaticamente pro cliente. O contato é sempre passivo (cliente me chama, eu respondo).
* Meu CS lê a sugestão no Slack, copia, e cola manualmente no WhatsApp.
* Quando o CS responde pelo celular, a Evolution API detecta isso (fromMe: true) e o n8n marca a conversa como "lida" automaticamente.
