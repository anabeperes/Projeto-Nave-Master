wn', text: '*Medio*\\n' + fmtMin(d.tempo_medio_min) },\n      { type: 'mrkdwn', text: '*Mediana*\\n' + fmtMin(d.tempo_mediano_min) },\n      { type: 'mrkdwn', text: '*Mais rapido*\\n' + fmtMin(d.tempo_min_min) },\n      { type: 'mrkdwn', text: '*Mais demorado*\\n' + fmtMin(d.tempo_max_min) }\n    ]\n  },\n  { type: 'divider' },\n  {\n    type: 'context',\n    elements: [{ type: 'mrkdwn', text: '\\ud83d\\udc64 *Mentorados que chamaram hoje:* ' + nomes }]\n  }\n];\n\nreturn [{\n  json: {\n    blocks,\n    fallback_text: 'Relatorio diario - ' + total + ' mensagens de ' + mentorados + ' mentorados'\n  }\n}];"


